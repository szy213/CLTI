<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈粒 - 性格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-green: #f2f5f1;
            --soft-green: #e6ede4;
            --accent-green: #6b8e23; /* 橄榄绿 */
            --ink-black: #2c3e50;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-green);
            color: var(--ink-black);
            background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .main-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(107, 142, 35, 0.1);
        }
        .option-card {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid transparent;
            cursor: pointer;
        }
        .option-card:hover {
            background: var(--soft-green);
            border-color: var(--accent-green);
        }
        .option-card.selected {
            background: var(--soft-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 0 1px var(--accent-green);
        }
        .progress-bar {
            height: 2px;
            background: #dcdde1;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: var(--accent-green);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .leaf-pattern {
            position: fixed;
            bottom: -50px;
            right: -50px;
            opacity: 0.05;
            pointer-events: none;
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <svg class="leaf-pattern" width="400" height="400" viewBox="0 0 100 100">
        <path d="M50 0 C70 30 90 40 100 100 C40 90 30 70 0 50 C30 50 40 30 50 0" fill="currentColor"/>

    <div id="app" class="max-w-xl w-full main-container p-10 md:p-14 rounded-3xl shadow-sm relative overflow-hidden">

            <button onclick="startTest()" class="px-10 py-3 border border-stone-800 text-stone-800 rounded-full hover:bg-stone-800 hover:text-white transition-all duration-500 tracking-[0.2em] text-sm">
                开启洄游
            </button>
        </div>

        <!-- 测试屏幕 -->

                <div class="flex justify-between items-center mb-3">
                    <span id="progress-text" class="text-[10px] text-stone-400 tracking-widest uppercase">Sequence 01</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-bar-inner" class="progress-inner" style="width: 0%"></div>
                </div>
            </div>
            
            <h2 id="question-text" class="text-xl md:text-2xl font-bold mb-10 text-stone-800 leading-relaxed"></h2>

            <div id="options-container" class="space-y-4 mb-12"></div>

            <!-- 控制按钮 -->
            <div class="flex justify-between items-center pt-6 border-t border-stone-100">
                <button id="prev-btn" onclick="prevQuestion()" class="text-[10px] tracking-[0.2em] text-stone-400 hover:text-stone-800 transition-all uppercase">
                    [ Prev / 上一题 ]
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="text-[10px] tracking-[0.2em] text-stone-800 hover:text-stone-600 transition-all uppercase font-bold">
                    [ Next / 下一题 ]
                </button>
            </div>
        </div>

            <div id="result-quote" class="text-stone-400 italic text-sm mb-8 tracking-wider"></div>
            
            <div id="result-desc" class="text-stone-600 leading-loose mb-10 text-base text-left px-4 border-l border-stone-200"></div>

                    <svg class="w-3 h-3 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8H5v2h2V8zm2 0h2v2H9V8zm6 0h-2v2h2V8z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
                    在网易云打开
                </a>

            <button onclick="resetTest()" class="text-xs text-stone-400 hover:text-stone-800 transition-colors tracking-widest uppercase underline underline-offset-8">
                [ 再次洄游 / Re-Start ]
            </button>
        </div>
    </div>

        function startTest() {
            currentQuestion = 0;
            selections.fill(null);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            const optionsContainer = document.getElementById('options-container');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `Sequence ${String(currentQuestion + 1).padStart(2, '0')} / ${questions.length}`;
            document.getElementById('progress-bar-inner').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-card w-full p-5 text-left text-sm tracking-wide rounded-xl fade-in';
                if (selections[currentQuestion] === idx) {
                    btn.classList.add('selected');
                }
                btn.style.animationDelay = `${idx * 0.1}s`;
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(idx);
                optionsContainer.appendChild(btn);
            });

            prevBtn.style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
            nextBtn.innerText = currentQuestion === questions.length - 1 ? '[ Result / 查看结果 ]' : '[ Next / 下一题 ]';
            
            updateNextButtonState();
        }

        function selectOption(index) {
            selections[currentQuestion] = index;
            const cards = document.querySelectorAll('.option-card');
            cards.forEach((card, i) => {
                if (i === index) card.classList.add('selected');
                else card.classList.remove('selected');
            });
            updateNextButtonState();
        }

        function updateNextButtonState() {
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = selections[currentQuestion] === null;
        }

        function nextQuestion() {
            if (selections[currentQuestion] === null) return;
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function showResult() {
            const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            selections.forEach((choiceIndex, qIndex) => {
                const score = questions[qIndex].options[choiceIndex].score;
                for (let key in score) {
                    scores[key] += score[key];
                }
            });

            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const mbti = 
                (scores.E >= scores.I ? 'E' : 'I') +
                (scores.N >= scores.S ? 'N' : 'S') +
                (scores.F >= scores.T ? 'F' : 'T') +
                (scores.P >= scores.J ? 'P' : 'J');
            
            const result = results[mbti] || results["INFP"];
            document.getElementById('result-title').innerText = result.title;
            
            const quoteEl = document.getElementById('result-quote');
            if (result.quote) {
                quoteEl.innerText = result.quote;
                quoteEl.style.display = 'block';
            } else {
                quoteEl.style.display = 'none';
            }

            document.getElementById('result-desc').innerText = result.desc;
            
            // 更新听歌链接
            const musicLink = document.getElementById('music-link');
            if (result.link) {
                musicLink.href = result.link;
                musicLink.parentElement.style.display = 'block';
            } else {
                musicLink.parentElement.style.display = 'none';
            }
        }

        function resetTest() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
